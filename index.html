<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The 9 Lines Games — Times Table Practice</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F2F7FF;
    --panel:#FFFFFF;
    --ink:#27395D;
    --ink-soft:#5C6E8F;
    --sun:#FFB703;
    --sun-deep:#F79D00;
    --line:#D7E3F4;
    --card-back:#27395D;
    --shadow:0 4px 0 rgba(39,57,93,.12);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{
    font-family:'Fredoka',system-ui,-apple-system,'Segoe UI',sans-serif;
    background:
      radial-gradient(circle at 12% 8%, rgba(255,183,3,.10), transparent 30%),
      radial-gradient(circle at 88% 90%, rgba(59,178,115,.10), transparent 32%),
      var(--bg);
    color:var(--ink);
    padding:14px;
  }
  .wrap{max-width:1120px;margin:0 auto}

  header{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
  .badge{
    width:52px;height:52px;border-radius:16px;background:var(--card-back);
    display:grid;place-items:center;font-size:28px;flex:none;
    background-image:repeating-linear-gradient(135deg, rgba(255,255,255,.14) 0 8px, transparent 8px 16px);
    box-shadow:var(--shadow);
  }
  h1{font-size:clamp(20px,3.4vw,30px);font-weight:700;line-height:1.05}
  h1 small{display:block;font-size:.52em;font-weight:500;color:var(--ink-soft)}

  .tabs{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;margin-bottom:12px}
  .tab{
    border:2px solid var(--line);background:var(--panel);border-radius:16px;
    padding:10px 12px;font:inherit;text-align:left;cursor:pointer;box-shadow:var(--shadow);
    display:flex;align-items:center;gap:10px;transition:transform .12s;
  }
  .tab:hover{transform:translateY(-2px)}
  .tab .emo{font-size:26px;flex:none}
  .tab .t{font-weight:700;font-size:14px}
  .tab .d{font-weight:500;font-size:11.5px;color:var(--ink-soft)}
  .tab.on{background:var(--sun);border-color:var(--sun-deep)}
  .tab.on .t{color:#4A3200}
  .tab.on .d{color:#7A5200}

  .frame{
    width:100%;height:940px;border:2px solid var(--line);border-radius:18px;
    background:var(--panel);box-shadow:var(--shadow);
  }
  @media(max-width:640px){.frame{height:1200px}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="badge">🦹</div>
    <h1>The 9 Lines Games<small>Times table practice · Smart &amp; Special Teaching</small></h1>
  </header>

  <div class="tabs" id="tabs">
    <button class="tab on" data-src="times-table-robber.html">
      <span class="emo">🃏</span>
      <span><span class="t">Times Table Robber</span><br>
      <span class="d">Drag the numbers into order before the robber strikes!</span></span>
    </button>
    <button class="tab" data-src="double-trouble-robber.html">
      <span class="emo">🏠</span>
      <span><span class="t">Double Trouble</span><br>
      <span class="d">Two tables, two houses — sort every number home!</span></span>
    </button>
    <button class="tab" data-src="catch-the-robber.html">
      <span class="emo">🚓</span>
      <span><span class="t">Catch the Robber</span><br>
      <span class="d">Memorize the grid and catch him hiding!</span></span>
    </button>
    <button class="tab" data-src="robbers-footprints.html">
      <span class="emo">👣</span>
      <span><span class="t">Robber's Footprints</span><br>
      <span class="d">Find the real stolen numbers in the lineup!</span></span>
    </button>
    <button class="tab" data-src="beat-the-clock-heist.html">
      <span class="emo">⏱️</span>
      <span><span class="t">Beat the Clock Heist</span><br>
      <span class="d">Lock the vault before he cracks the safe!</span></span>
    </button>
  </div>

  <iframe class="frame" id="frame" src="times-table-robber.html" title="Times table game"></iframe>
</div>

<script>
  const tabs=document.querySelectorAll('.tab'), frame=document.getElementById('frame');
  tabs.forEach(t=>t.addEventListener('click',()=>{
    tabs.forEach(x=>x.classList.toggle('on',x===t));
    frame.src=t.dataset.src;
  }));
</script>
</body>
</html>
